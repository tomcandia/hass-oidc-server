name: Create Release

on:
  push:
    branches:
      - main
    paths:
      - "custom_components/oidc_provider/manifest.json"

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version' custom_components/oidc_provider/manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ steps.version.outputs.version }}
        run: |
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Zip integration
        if: steps.check.outputs.exists == 'false'
        run: |
          cd custom_components/oidc_provider
          zip -r ../../oidc_provider.zip . -x '__pycache__/*' '*/__pycache__/*'

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ steps.version.outputs.version }}
        run: gh release create "$TAG" --title "$TAG" --generate-notes oidc_provider.zip
